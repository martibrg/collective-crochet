<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: white; }
    canvas { display: block; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<script>
let imgs = [];
let current = null;
let loaded = false;
const base = "https://raw.githubusercontent.com/martibrg/collective-crochet/main/";
const total = 12;
const IMG_W = 2788;
const IMG_H = 1976;

function preload() {
  for (let i = 1; i <= total; i++) {
    let pad = i < 10 ? '0' + i : '' + i;
    imgs.push(loadImage(base + 'model_spec-' + pad + '.jpg'));
  }
}

function setup() {
  let scale = min(windowWidth / IMG_W, windowHeight / IMG_H);
  createCanvas(IMG_W * scale, IMG_H * scale);
  loaded = true;
}

function draw() {
  background(255);
  if (current === null) {
    fill(0);
    noStroke();
    textAlign(CENTER, CENTER);
    textFont('monospace');
    textSize(13);
    text('click', width / 2, height / 2);
  } else {
    image(current, 0, 0, width, height);
  }
}

function mousePressed() {
  if (!loaded) return;
  if (current === null) {
    current = random(imgs);
  } else {
    current = null;
  }
}

function windowResized() {
  let scale = min(windowWidth / IMG_W, windowHeight / IMG_H);
  resizeCanvas(IMG_W * scale, IMG_H * scale);
}
</script>
</body>
</html>

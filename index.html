<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>
<script>
const base = "https://raw.githubusercontent.com/martibrg/collective-crochet/main/";
const total = 12;
let imgs = [];
let current = null;

function preload() {
  for (let i = 1; i <= total; i++) {
    let pad = i < 10 ? '0' + i : '' + i;
    imgs.push(loadImage(base + 'model_spec-' + pad + '.jpg'));
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
}

function draw() {
  if (current === null) {
    fill(0);
    noStroke();
    textAlign(CENTER, CENTER);
    textFont('monospace');
    textSize(13);
    text('click', width / 2, height / 2);
  } else {
    let imgW = 1920;
    let imgH = current.height * (imgW / current.width);
    image(current, width / 2 - imgW / 2, height / 2 - imgH / 2, imgW, imgH);
  }
}

function mousePressed() {
  if (current === null) {
    current = random(imgs);
  } else {
    current = null;
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>
